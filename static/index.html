<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindMy Location Tracker</title>

  <!-- Leaflet.js -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<div id="sidebar">

  <!-- Mobile-only drag handle (hidden on desktop) -->
  <div id="sheet-handle">
    <div id="sheet-handle-pill"></div>

    <!-- Default: app title + poll status -->
    <div id="sheet-mini-default">
      <span id="sheet-mini-title">FindMy Tracker</span>
      <span id="poll-status-mini" class="status-badge idle">Idle</span>
    </div>

    <!-- Point selected: always-visible point info -->
    <div id="sheet-mini-point" class="hidden">
      <div class="smp-row1">
        <span id="smp-device"></span>
        <button id="sheet-point-close" aria-label="Close">✕</button>
      </div>
      <div id="smp-time"></div>
      <div id="smp-meta"></div>
    </div>
  </div>

  <!-- Scrollable content area -->
  <div id="sheet-body">
    <div id="sidebar-header">
      <h1>FindMy Tracker</h1>
      <a href="/details" id="details-link" title="Report Details">Details</a>
      <button id="poll-status" class="status-badge idle" aria-expanded="false">Idle</button>
    </div>

    <!-- Poll details panel -->
    <div id="poll-details-panel" class="poll-details-panel">
      <div id="poll-details-content" class="poll-details-content"></div>
    </div>

    <!-- Time range -->
    <section class="sidebar-section">
      <h2>Time Range</h2>
      <div class="range-row">
        <label>From</label>
        <input type="datetime-local" id="range-start" />
      </div>
      <div class="range-row">
        <label>To</label>
        <input type="datetime-local" id="range-end" />
      </div>
      <div class="range-presets">
        <button class="preset-btn" data-hours="1">1h</button>
        <button class="preset-btn" data-hours="6">6h</button>
        <button class="preset-btn" data-days="3">3d</button>
        <button class="preset-btn" data-days="7">7d</button>
        <button class="preset-btn" data-days="30">30d</button>
      </div>
      <button id="btn-apply" class="btn-primary">Apply</button>
    </section>

    <!-- Devices -->
    <section class="sidebar-section">
      <div class="section-header-row">
        <h2>Devices</h2>
        <button id="btn-toggle-all" class="btn-toggle-all">Hide All</button>
      </div>
      <div id="device-list"></div>
      <div class="poll-btn-row">
        <button id="btn-poll" class="btn-secondary">Poll Apple</button>
        <button id="btn-poll-google" class="btn-secondary btn-google">Poll Google</button>
      </div>
    </section>

    <!-- Stats -->
    <section class="sidebar-section" id="stats-section">
      <h2>Stats</h2>
      <div id="stats-content" class="stats-grid"></div>
    </section>

    <!-- Live Logs -->
    <section class="sidebar-section" id="log-section">
      <div class="section-header-row">
        <h2>Live Logs</h2>
        <button id="btn-toggle-logs" class="btn-toggle-logs">Show</button>
      </div>
      <div id="log-panel" class="log-panel hidden">
        <div id="log-output" class="log-output"></div>
        <div class="log-toolbar">
          <button id="btn-log-clear" class="btn-log-clear">Clear</button>
          <label class="log-autoscroll-label">
            <input type="checkbox" id="log-autoscroll" checked />
            Auto-scroll
          </label>
        </div>
      </div>
    </section>
  </div><!-- #sheet-body -->

</div><!-- #sidebar -->

<div id="map"></div>

<!-- Point popup -->
<div id="popup" class="hidden">
  <div id="popup-inner">
    <button id="popup-close">&times;</button>
    <div id="popup-content"></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
